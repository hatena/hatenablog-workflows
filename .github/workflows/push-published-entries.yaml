name: "[Reusable workflows] push published entries"

on:
  workflow_call:
    secrets:
      OWNER_API_KEY:
        required: true

jobs:
  upload-images:
    if: github.event.pull_request.merged == false
    uses: hatena/hatenablog-workflows/.github/workflows/upload-images.yaml@95a8b85d1b4d9c333102fb47a5dff72fe6d7a1cd # v1
    secrets:
      OWNER_API_KEY: ${{ secrets.OWNER_API_KEY }}
